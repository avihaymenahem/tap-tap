<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Tap-Tap</title>

    <!-- The display face paints titles on first render; preloading it avoids a
         flash of the system font on the logo. The seven-segment HUD face is
         preloaded too (font-display: block) so a score chip never flashes
         fallback digits at the start of a run. -->
    <link rel="preload" href="/fonts/space-grotesk-700.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/dseg7-classic-bold.woff2" as="font" type="font/woff2" crossorigin />

    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Matches --bg, so the status bar blends into the app rather than
         bracketing it with a strip of browser chrome. -->
    <meta name="theme-color" content="#0a0a18" />

    <!-- iOS ignores the manifest for standalone launch and icons; these are the
         equivalent, and without them "Add to Home Screen" opens a Safari tab
         with the address bar still showing. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tap-Tap" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
